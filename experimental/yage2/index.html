<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Selector</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #101214;
        color: #f4f1e8;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100vw - 40px));
      }

      h1 {
        font-size: 40px;
        font-weight: 800;
        letter-spacing: 0;
        margin: 0 0 22px;
      }

      nav {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
      }

      a {
        border: 1px solid #343a40;
        border-radius: 8px;
        color: inherit;
        padding: 18px;
        text-decoration: none;
        background: #181c20;
      }

      a:hover,
      a:focus-visible {
        border-color: #e2b84b;
        outline: none;
      }

      strong {
        display: block;
        font-size: 20px;
        margin-bottom: 8px;
      }

      span {
        color: #b8c0c7;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Choose a game</h1>
      <nav aria-label="Game list">
        <a href="./boxing.html">
          <strong>Split Decision</strong>
          <span>Two-button mind games in the boxing ring.</span>
        </a>
        <a href="./platformer.html">
          <strong>Two-Box Coop</strong>
          <span>A compact cooperative platformer sandbox.</span>
        </a>
        <a href="./stick_shooter.html" data-create-lobby>
          <strong>Stick Shooter</strong>
          <span>Drop-in top-down arena shooting with runtime multiplayer.</span>
        </a>
        <a href="./synonym_ladder.html">
          <strong>Synonym Ladder</strong>
          <span>Build the shortest path between words using only synonyms.</span>
        </a>
      </nav>
    </main>
    <script>
      function createLobbyId() {
        const id =
          crypto.randomUUID?.() ??
          `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        return id.replace(/[^a-zA-Z0-9-]/g, "").slice(0, 12);
      }

      document
        .querySelector("[data-create-lobby]")
        ?.addEventListener("click", (event) => {
          event.preventDefault();
          const url = new URL("./stick_shooter.html", window.location.href);
          url.searchParams.set("lobby", createLobbyId());
          window.location.assign(url.toString());
        });
    </script>
    <script src="./assets/riffwave.js"></script>
    <script src="./assets/sfxr.js"></script>
  </body>
</html>
